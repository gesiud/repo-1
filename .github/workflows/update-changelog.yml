name: Update Changelog in repo-2

on:
  push:
    branches:
      - '**'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo-1
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit messages from this push
        id: commits
        run: |
          # Collect all commit messages introduced by this push
          COMMITS=$(git log --pretty=format:"- %s (%h) by %an on %ad" --date=short ${{ github.event.before }}..${{ github.sha }} 2>/dev/null || \
                    git log --pretty=format:"- %s (%h) by %an on %ad" --date=short -1)
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Verify REPO2_PAT secret is configured
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::The REPO2_PAT secret is not configured. Please add a Personal Access Token with 'repo' scope to this repository's secrets under the name REPO2_PAT."
            exit 1
          fi
        env:
          PAT: ${{ secrets.REPO2_PAT }}

      - name: Checkout repo-2
        uses: actions/checkout@v4
        with:
          repository: gesiud/repo-2
          token: ${{ secrets.REPO2_PAT }}
          path: repo-2

      - name: Create or update PR with changelog update to repo-2 master
        run: |
          cd repo-2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGELOG_BRANCH="changelog"
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SOURCE_BRANCH="${{ github.ref_name }}"
          REPO="repo-1"

          # Switch to existing changelog branch or create it from master
          if git ls-remote --exit-code --heads origin "$CHANGELOG_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$CHANGELOG_BRANCH"
            git checkout -b "$CHANGELOG_BRANCH" "origin/$CHANGELOG_BRANCH"
          else
            git checkout -b "$CHANGELOG_BRANCH"
          fi

          # Create changelog.md if it doesn't exist
          if [ ! -f changelog.md ]; then
            echo "# Changelog" > changelog.md
            echo "" >> changelog.md
          fi

          # Prepend new entry after the first line (the title)
          ENTRY="\n## [$REPO] $DATE (branch: \`$SOURCE_BRANCH\`)\n\n${{ steps.commits.outputs.COMMITS }}\n"
          awk -v entry="$ENTRY" 'NR==1{print; print entry; next}1' changelog.md > changelog.tmp && mv changelog.tmp changelog.md

          # Skip if there are no changes
          git add changelog.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi

          git commit -m "chore: update changelog from repo-1 commit(s) [${{ github.sha }}]"
          git push origin "$CHANGELOG_BRANCH"

          # Open a PR only if one does not already exist for this branch
          EXISTING_PR=$(gh pr list \
            --repo gesiud/repo-2 \
            --base master \
            --head "$CHANGELOG_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --repo gesiud/repo-2 \
              --base master \
              --head "$CHANGELOG_BRANCH" \
              --title "chore: update changelog from repo-1" \
              --body "Automated changelog updates from [repo-1](https://github.com/gesiud/repo-1). New entries will be appended to this PR until it is merged."
            echo "PR created."
          else
            echo "PR #$EXISTING_PR already exists — new commit added to it."
          fi
        env:
          GH_TOKEN: ${{ secrets.REPO2_PAT }}
